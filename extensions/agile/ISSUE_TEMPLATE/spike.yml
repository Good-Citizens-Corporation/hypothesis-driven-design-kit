name: 'SPIKE'
description: 'Timeboxed research to reduce uncertainty'
title: 'SPIKE: '
labels: ['spike', 'research']
body:
  - type: markdown
    attributes:
      value: |
        ## SPIKE Template

        A SPIKE is timeboxed research to answer a specific question.
        
        **Key principle:** SPIKEs don't ship features. They produce:
        - Baseline data
        - Technical feasibility answers
        - Pre-registration-ready hypotheses

  - type: textarea
    id: question
    attributes:
      label: 'Research Question'
      description: 'What specific question are you answering?'
      placeholder: 'What is the current onboarding completion rate, and where do users drop off?'
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: 'Approach'
      description: 'How will you answer this question?'
      placeholder: |
        1. Pull analytics for last 30 days
        2. Build funnel visualization
        3. Review 5 session recordings of drop-offs
        4. Summarize findings
    validations:
      required: true

  - type: input
    id: timebox
    attributes:
      label: 'Timebox (hours)'
      description: 'Maximum time to spend. When time is up, stop and report.'
      placeholder: '8'
    validations:
      required: true

  - type: textarea
    id: outputs
    attributes:
      label: 'Expected Outputs'
      description: 'What will exist when this is done?'
      placeholder: |
        - [ ] Funnel analysis document
        - [ ] Baseline metrics recorded
        - [ ] Recommendation: proceed with EPIC or not
        - [ ] Draft PRE-XXX if proceeding
    validations:
      required: true

  - type: textarea
    id: success
    attributes:
      label: 'Definition of Done'
      description: 'How do we know the SPIKE is complete?'
      placeholder: |
        SPIKE is complete when:
        - [ ] Question is answered (or determined unanswerable with current data)
        - [ ] Findings documented
        - [ ] Next steps recommended
        - [ ] Timebox respected (even if incomplete)
    validations:
      required: true

  - type: textarea
    id: hypothesis_draft
    attributes:
      label: 'Potential Hypothesis (if findings support)'
      description: 'If this SPIKE supports action, what might you pre-register?'
      placeholder: 'If we find significant drop-off at step 3, we may hypothesize: "Reducing steps from 5 to 3 will increase completion rate from X% to Y%"'
    validations:
      required: false
